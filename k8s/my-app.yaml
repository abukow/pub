apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: ns02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: harbor.sith.lan/repo/nginx-cgi:1.0
        ports:
        - containerPort: 8090
